<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
  </defs>
  <!-- Edge-to-edge fill (no rounded corners, no transparent area). Google
       crops this to a circle for search results; filling the entire canvas
       means the circle reaches the rim with brand color, no white halo. -->
  <rect width="64" height="64" fill="#1a1a24"/>
  <text x="32" y="48"
        text-anchor="middle"
        font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif"
        font-weight="900"
        font-size="44"
        fill="url(#g)">W</text>
</svg>
