<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
  </defs>
  <!-- Literal circle so Google's favicon chrome (which always shows a
       circular badge) sees our background rim-to-rim instead of a square
       stranded inside a pale halo. -->
